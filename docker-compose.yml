# Production-style stack: nginx serves the built frontend and reverse-proxies
# /api to the backend (single entry on host :8080). The data pipeline is NOT on
# the `up` path — see docs/adr/0001-pipeline-off-compose-startup-path.md.
#
#   docker compose up --build                       # serve the app
#   docker compose --profile data run --rm pipeline # (re)generate the dataset
services:
  backend:
    build: ./backend
    environment:
      DATASET_PARQUET: /data/dataset_concentration_patrimoine_fr.parquet
      DATASET_CSV: /data/dataset_concentration_patrimoine_fr.csv
    volumes:
      # Serve whatever the pipeline produced on the host; read-only.
      - ./pipeline/out:/data:ro
    expose:
      - "8000"
    restart: unless-stopped
    # duckdb/pandas/pyarrow over the full dataset can spike; bound it.
    mem_limit: 2g
    # Hardening: drop all caps, block privilege escalation, run a read-only
    # rootfs. The app only reads /data (RO) and needs a writable /tmp for any
    # duckdb spill files.
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  frontend:
    # Context is the repo root so the build sees the workspace's single root
    # pnpm-lock.yaml (the Dockerfile copies only what it needs). See frontend/Dockerfile.
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    # Bind to loopback only; rootless nginx serves on :8080 inside the container.
    ports:
      - "127.0.0.1:8080:8080"
    expose:
      - 8080
    restart: unless-stopped
    # Hardening: read-only rootfs; nginx-unprivileged writes its pid and temp
    # files under /tmp and caches under /var/cache/nginx, so back those with tmpfs.
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  # On-demand dataset generation. Run explicitly with the `data` profile; never
  # started by a bare `docker compose up`. Writes into the same host pipeline/out
  # the backend serves. Override args, e.g.:
  #   docker compose --profile data run --rm pipeline --download --full
  pipeline:
    build: ./pipeline
    profiles: ["data"]
    # Run as the host user so files written to the bind mounts below aren't
    # root-owned on the host. Invoke with:
    #   UID=$(id -u) GID=$(id -g) docker compose --profile data run --rm pipeline
    user: "${UID:-1000}:${GID:-1000}"
    # Run via docker-init (tini) as PID 1 so Ctrl-C/SIGTERM is forwarded to the
    # Python process and a long --download run aborts cleanly instead of being
    # SIGKILLed, and any child is reaped.
    init: true
    # Bound memory: pandas/pyarrow over the full dataset can spike.
    mem_limit: 2g
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file:
      - path: .env
        required: false
    volumes:
      - ./pipeline/out:/pipeline/out
      - ./pipeline/data:/pipeline/data
    command: ["--annee-min", "2000"]
