# Scheduled data refresh (HANDOFF.md §9 jalon 7).
# STUB: runs the pipeline in --download --full mode and commits a new millésime.
# The pipeline prints detected revisions to stdout (see build_dataset.write_outputs).
name: refresh-data

on:
  schedule:
    - cron: "0 4 1 * *" # monthly, 04:00 UTC on the 1st
  workflow_dispatch: {}

# Read-only for now; widen to `contents: write` when the commit/publish TODO lands.
permissions:
  contents: read

# Don't let a manual run race a scheduled one (matters once the commit step exists).
concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20 # bounds a hang against the (untested) live WID/DGFiP network
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r pipeline/requirements.txt
      - name: Build dataset (download latest millésime)
        env:
          WID_API_KEY_B64: ${{ secrets.WID_API_KEY_B64 }}
          DGFIP_IFI_XLS_URL: ${{ secrets.DGFIP_IFI_XLS_URL }}
        working-directory: pipeline
        run: python build_dataset.py --download --full
      # TODO: commit/publish the new millésime; surface revisions in the run summary.
