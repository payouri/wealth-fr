# Rootless nginx (nginxinc/nginx-unprivileged) cannot bind :80; listen on 8080.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Baseline security headers for the served SPA.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Reverse-proxy the API to the backend service on the compose network.
    # Same-origin with the static assets, so the frontend needs no CORS or
    # build-time API URL — it fetches /api/* relatively (see src/api/client.ts).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Don't hang on nginx's 60s defaults if the backend is slow/unresponsive.
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # SPA fallback — let the client router handle unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
