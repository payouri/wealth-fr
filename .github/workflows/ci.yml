# Continuous integration — runs the same gates documented in AGENTS.md so a green
# CI run == a passing local Definition of Done. No secrets required (the live
# WID/DGFiP integration runs in prod, not CI; see issue #12).
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (ruff · mypy · pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12" # matches pyproject target-version + Dockerfiles
          cache: pip
      - name: Install deps (runtime + dev tooling)
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt -r backend/requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy
      - name: pytest (backend contract)
        working-directory: backend
        run: python -m pytest -q
      # Backend-canonical contract gate (ADR 0005, #17): regenerate the committed
      # openapi.json from the Pydantic models and fail if it drifts. This is the
      # cross-job interface the frontend job then generates types.ts from.
      - name: Regenerate openapi.json
        working-directory: backend
        run: python -m app.export_openapi
      - name: Fail on openapi.json drift (Pydantic -> schema)
        run: git diff --exit-code openapi.json

  frontend:
    name: Frontend (biome · tsc · vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Enable corepack (pins pnpm from package.json "packageManager")
        run: corepack enable
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc # single source of truth (matches frontend Dockerfile)
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml # workspace root lockfile (single source of truth)
      - run: pnpm install --frozen-lockfile
      # Backend-canonical contract gate (ADR 0005, #17): regenerate types.ts from
      # the committed openapi.json and fail if it drifts. Stays PURE-NODE — it
      # reads the committed JSON, never the Python toolchain.
      - run: pnpm gen:types # openapi-typescript ../openapi.json -> src/api/types.ts (+ biome format)
      - name: Fail on types.ts drift (schema -> TS)
        run: git diff --exit-code src/api/types.ts
      - run: pnpm lint # biome check .
      - run: pnpm typecheck # tsc -b --noEmit
      - run: pnpm test # vitest run

  docker:
    name: Docker (compose build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build all images (validates the Dockerfiles, no push)
        run: docker compose build
