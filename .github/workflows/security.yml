# DevSecOps scanning, kept separate from the ci.yml correctness gates so a
# newly-disclosed CVE surfaces on the weekly schedule, not just on code changes.
#   - CodeQL : SAST for the JS/TS frontend and the Python pipeline/backend
#   - audit  : dependency advisories (pnpm + pip) -- report-only until triaged
#   - trivy  : OS/package CVEs in the built container images
#
# Each scan runs only when files it cares about change (see the `changes` job);
# the weekly schedule and manual dispatch always run everything, so the CVE
# sweep is never filtered out.
name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 5 * * 1" # weekly, Monday 05:00 UTC -- catch newly-disclosed CVEs
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which areas changed so downstream scans can skip irrelevant runs.
  # On schedule / manual dispatch the filter is skipped and every scan force-runs.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read # paths-filter reads the PR file list via the API
    outputs:
      js: ${{ steps.filter.outputs.js }}
      py: ${{ steps.filter.outputs.py }}
      deps: ${{ steps.filter.outputs.deps }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        id: filter
        with:
          filters: |
            js:
              - 'frontend/**'
              - '.github/workflows/security.yml'
            py:
              - 'backend/**'
              - 'pipeline/**'
              - '.github/workflows/security.yml'
            deps:
              - 'pnpm-lock.yaml'
              - '**/package.json'
              - '**/requirements*.txt'
              - '**/requirements*.in'
              - '.github/workflows/security.yml'
            docker:
              - '**/Dockerfile'
              - 'docker-compose.yml'
              - '.dockerignore'
              - 'pnpm-lock.yaml'
              - '**/package.json'
              - '**/requirements*.txt'
              - '**/requirements*.in'
              - '.github/workflows/security.yml'

  # CodeQL is split per language (rather than one matrix job) so each scan can be
  # gated on its own paths -- the `matrix` context is not available in a job `if`.
  codeql-js:
    name: CodeQL (javascript-typescript)
    needs: changes
    if: >-
      github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.js == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          category: "/language:javascript-typescript"

  codeql-py:
    name: CodeQL (python)
    needs: changes
    if: >-
      github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.py == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          languages: python
      - uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          category: "/language:python"

  deps-audit:
    name: Dependency audit (pnpm + pip)
    needs: changes
    if: >-
      github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Report-only for now: surfaces advisories in the log without blocking. Flip
    # to a real gate once the current backlog is triaged (known: shell-quote
    # GHSA-w7jw-789q-3m8p, a dev-only transitive of concurrently -- fix with a
    # pnpm override to shell-quote >=1.8.4).
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Enable corepack (pins pnpm from package.json "packageManager")
        run: corepack enable
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit (high and above)
        run: pnpm audit --audit-level high
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: pip-audit (pipeline + backend deps)
        run: pipx run pip-audit -r pipeline/requirements.txt -r backend/requirements-dev.txt

  container-scan:
    name: Trivy (${{ matrix.image }})
    needs: changes
    if: >-
      github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: frontend
            context: .
            dockerfile: frontend/Dockerfile
          - image: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build the image to scan
        run: docker build -t scan-${{ matrix.image }}:ci -f ${{ matrix.dockerfile }} ${{ matrix.context }}
      - name: Trivy scan (SARIF to the Security tab; report-only)
        uses: aquasecurity/trivy-action@bfa4b33a029b9aa80ddb784b45574c30e072c59e # master
        with:
          image-ref: scan-${{ matrix.image }}:ci
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "0" # don't block on base-image CVEs; results land in the Security tab
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}
